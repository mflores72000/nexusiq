services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexusiq
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexusiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8888:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://nexus:nexus@db:5432/nexusiq
      CSV_PATH: /app/data/ai4i2020.csv
    volumes:
      - ./data:/app/data:ro
    # 1) Crea tablas, 2) Ingesta CSV, 3) Arranca la API
    command: >
      sh -c "python -m src.database_init &&
             python -m src.pipeline.ingest &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
